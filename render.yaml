services:
  - type: web
    name: frebob-api
    runtime: node
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: "0.0.0.0"
      - key: CORS_ORIGINS
        sync: false
        # Include the FreBob web origin when the browser calls this API, e.g.
        # https://frebob-web.onrender.com (comma-separated with other origins)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: YARNGPT_API_KEY
        sync: false
